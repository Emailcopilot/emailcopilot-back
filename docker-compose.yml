services:
  db:
    image: postgres:17.3-alpine
    restart: always
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}

  app:
    build: . # ← Dockerfile is at root now, not ./app
    container_name: lead-gen-app
    restart: unless-stopped
    ports:
      - "3001:3001"
    env_file:
      - .env # ← loads your env vars automatically
    deploy:
      resources:
        limits:
          memory: 1g

volumes:
  db_data:
